<div class="navbar bg-base-300 shadow-sm">
  <div class="flex-1">
    <a href="{% url 'index' %}" class="btn btn-ghost text-2xl md:text-3xl">Vexillologists</a>
  </div>
  <div class="flex flex-row">
    <label class="hidden md:flex cursor-pointer gap-2 mr-4 mt-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <input id="theme-controller" type="checkbox" value="light" class="toggle theme-controller" />
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5" />
            <path
                d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" />
        </svg>
    </label>
    <a href="{% url 'quiz' %}" class="btn btn-success text-2xl md:text-3xl rounded-2xl p-4 mr-2">Quiz!</a>
    <div class="dropdown dropdown-end">
      <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar mr-4 hover:border-6 border-success">
        {% load static %}
        <div class="w-10 rounded-full">
          <img
            alt="Default profile picture"
            src="{% static 'assets/images/default_pfp.png' %}" />
        </div>
      </div>
      <ul
        tabindex="0"
        class="menu menu-sm dropdown-content bg-base-300 rounded-box z-1 mt-3 w-52 p-2 shadow">
        <li><a href="{% url 'about' %}" class="text-2xl">About</a></li>
        <li><a href="{% url 'contact' %}" class="text-2xl">Contact</a></li>
        <!-- If user is authenticated, display settings + logout, otherwise, login + sign up -->
        {% if user.is_authenticated %}
          <li><a href="{% url 'settings' %}" class="text-2xl">Settings</a></li>
          <li>
            <form action="{% url 'logout' %}" method="post">
              {% csrf_token %}
              <button type="submit" class="text-2xl w-full text-left text-error">Logout</button>
            </form>
          </li>
        {% else %}
          <li><a href="{% url 'login' %}" class="text-2xl text-success">Login</a></li>
          <li><a href="{% url 'signup' %}" class="text-2xl text-success">Sign Up</a></li>
        {% endif %}
      </ul>
    </div>
  </div>
</div>
