{% extends 'base.html' %}

{% block title %}Login - Vexillology Quiz{% endblock %}

{% block content %}
<main class="flex flex-col items-center justify-center p-8 gap-4">
    <h1 class="text-3xl font-bold">Log In</h1>
    <form method="post" class="flex flex-col gap-4 w-full max-w-sm bg-base-200 p-6 rounded-lg">
        {% csrf_token %}
        {% for field in form %}
            <label class="form-control w-full">
                <div class="label">
                    <span class="label-text font-medium">{{ field.label }}</span>
                </div>
                {{ field }}
                {% for error in field.errors %}
                    <div class="label">
                        <span class="label-text-alt text-error font-medium">{{ error }}</span>
                    </div>
                {% endfor %}
            </label>
        {% endfor %}
        <button type="submit" class="btn btn-primary mt-4 w-full">Log In</button>
    </form>
    <p>Don't have an account? <a href="{% url 'signup' %}" class="link link-primary hover:text-primary-focus transition-colors">Sign up</a></p>
</main>

<script>
    // When DOM loads, give inputs DaisyUI classes to all form inputs (theme controller avoided)
    // Doing this otherwise we'd have to do some freaky Django stuff with widgets
    document.addEventListener("DOMContentLoaded", function() {
        const inputs = document.querySelectorAll("form input:not([type='hidden'])");
        inputs.forEach(input => {
            input.classList.add("input", "input-bordered", "w-full", "focus:outline-primary");
        });
    });
</script>
{% endblock %}
